name: Build and deploy Node.js app to Azure Web App - wildwoods-frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/main_wildwoods-frontend.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build
        working-directory: ./frontend
        env:
          CI: false
          REACT_APP_API_BASE_URL: https://wildwoods-geb8hychateyemam.eastus2-01.azurewebsites.net
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
          REACT_APP_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
          REACT_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
          REACT_APP_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID }}

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: frontend/build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app


      - name: List files for debug
        run: |
          echo "Current directory: $(pwd)"
          ls -l

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7D23902437CB4708A583E91A7EF56AA9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F91F72F7806846A48E6D86D5B7A74E5E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_351EA28B835449ADB9F1C4F5847DFC83 }}

      - name: 'Deploy to Azure Web App'
        run: |
          RG=$(az webapp list --query "[?name=='wildwoods-frontend'].resourceGroup | [0]" -o tsv)

          # Remove any settings that block deployment
          az webapp config appsettings delete \
            -n wildwoods-frontend -g "$RG" \
            --setting-names WEBSITE_RUN_FROM_PACKAGE 2>/dev/null || true

          # Get Kudu publishing credentials
          CREDS=$(az webapp deployment list-publishing-credentials \
            -n wildwoods-frontend -g "$RG" -o json)
          USER=$(echo "$CREDS" | jq -r .publishingUserName)
          PASS=$(echo "$CREDS" | jq -r .publishingPassword)
          SCM="https://wildwoods-frontend-ewdsetbrhzf2bwac.scm.eastus2-01.azurewebsites.net"

          # Clear stale deployment state (non-fatal)
          echo "=== Clearing stale deployments via VFS ==="
          curl -s -o /dev/null -w "deployments delete: %{http_code}\n" \
            -X DELETE -u "$USER:$PASS" \
            "$SCM/api/vfs/site/deployments/?recursive=true" \
            -H "If-Match: *" || true
          curl -s -o /dev/null -w "locks delete: %{http_code}\n" \
            -X DELETE -u "$USER:$PASS" \
            "$SCM/api/vfs/site/locks/?recursive=true" \
            -H "If-Match: *" || true

          # Upload files directly via VFS instead of zipdeploy
          echo "=== Uploading files via Kudu VFS ==="
          # First clear wwwroot
          curl -s -o /dev/null -w "wwwroot clear: %{http_code}\n" \
            -X DELETE -u "$USER:$PASS" \
            "$SCM/api/vfs/site/wwwroot/?recursive=true" \
            -H "If-Match: *" || true
          # Recreate wwwroot
          curl -s -o /dev/null -w "wwwroot mkdir: %{http_code}\n" \
            -X PUT -u "$USER:$PASS" \
            "$SCM/api/vfs/site/wwwroot/"

          # Use zip deploy via Kudu wardeploy (alternative to zipdeploy)
          echo "=== Creating zip ==="
          zip -r /tmp/app.zip .

          echo "=== Deploying via zipdeploy ==="
          HTTP_CODE=$(curl -s -o /tmp/deploy_response.txt -w "%{http_code}" \
            -X POST -u "$USER:$PASS" \
            --data-binary @/tmp/app.zip \
            -H "Content-Type: application/zip" \
            "$SCM/api/zipdeploy?isAsync=false" \
            --max-time 300)
          echo "zipdeploy response code: $HTTP_CODE"
          cat /tmp/deploy_response.txt || true
          echo ""

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "=== zipdeploy failed, trying PUT to /api/zip ==="
            HTTP_CODE2=$(curl -s -o /tmp/deploy_response2.txt -w "%{http_code}" \
              -X PUT -u "$USER:$PASS" \
              --data-binary @/tmp/app.zip \
              -H "Content-Type: application/zip" \
              "$SCM/api/zip/site/wwwroot/" \
              --max-time 300)
            echo "api/zip response code: $HTTP_CODE2"
            cat /tmp/deploy_response2.txt || true
            echo ""
            if [ "$HTTP_CODE2" -ge 400 ]; then
              echo "Both deploy methods failed"
              exit 1
            fi
          fi

          echo "=== Verifying deployment ==="
          curl -s -u "$USER:$PASS" \
            "$SCM/api/vfs/site/wwwroot/" | jq '.[].name' || true

          az webapp restart -n wildwoods-frontend -g "$RG"
          echo "=== Done ==="